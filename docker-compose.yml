services:
  backend:
    build: ./src/backend
    container_name: researchpal-backend
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - chroma_data:/app/chroma_db
      - upload_data:/app/data
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build: ./src/frontend
    container_name: researchpal-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  chroma_data:
  upload_data:
